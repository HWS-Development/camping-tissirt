name: Build & SFTP Deploy (with password)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (CRA)
        run: CI=false npm run build

      - name: Verify build
        run: ls -la build/

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: 147.93.54.14
          port: 65002
          username: u877729207
          password: Hospitality@2025
          local_path: build/
          remote_path: /home/u877729207/domains/mediumslateblue-hedgehog-415779.hostingersite.com/public_html/
          sftp_only: true
