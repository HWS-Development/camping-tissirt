name: Build & FTP Deploy (CRA, npm)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: ${{ secrets.BUILD_DIR }}      # "build"
      SERVER_DIR: ${{ secrets.SERVER_DIR }}    # your /home/.../public_html/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18            # CRA 5 works great on Node 18
          cache: 'npm'

      - name: Show lockfiles (sanity)
        run: ls -la

      - name: Install deps (npm ci needs package-lock.json)
        run: npm ci

      - name: Print scripts (sanity)
        run: cat package.json

      - name: Build (CRA)
        run: CI=false npm run build

      - name: Verify build output
        run: |
          ls -la "$BUILD_DIR"
          test -f "$BUILD_DIR/index.html"

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ${{ env.BUILD_DIR }}
          server-dir: ${{ env.SERVER_DIR }}
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/src/**
            **/*.md
            **/package*.json
            **/.env*
