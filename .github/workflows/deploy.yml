name: Build & FTP Deploy to Hostinger (CRA)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: ${{ secrets.BUILD_DIR }}      # set secret to: build
      SERVER_DIR: ${{ secrets.SERVER_DIR }}    # /home/u877729207/domains/mediumslateblue-hedgehog-415779.hostingersite.com/public_html/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build (CRA)
        run: npm run build

      - name: Verify build output
        run: |
          ls -la "$BUILD_DIR"
          test -f "$BUILD_DIR/index.html"

      - name: FTP Deploy (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5   # <-- correct repo + version
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ${{ env.BUILD_DIR }}
          server-dir: ${{ env.SERVER_DIR }}
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/src/**
            **/*.md
            **/package*.json
            **/.env*
